<!DOCTYPE html>
<html>
<head>
  <title>Viral Link Generator</title>
</head>

<body style="margin:0;font-family:Arial;background:#0f172a;color:white;">

<h2 style="text-align:center;padding:10px;">🔗 Viral Link Generator</h2>

<div style="padding:20px;text-align:center;">

  <input id="longUrl" placeholder="Paste your long URL"
    style="width:80%;padding:10px;margin:10px;" />

  <button onclick="generate()"
    style="padding:10px 20px;">Generate Link</button>

  <div id="result" style="margin-top:20px;"></div>

</div>

<script>

function generate() {
  let url = document.getElementById("longUrl").value;

  if (!url) {
    alert("Please enter URL");
    return;
  }

  // simple fake short link system (no backend needed)
  let shortId = Math.random().toString(36).substring(2, 8);

  let shortLink = window.location.href + "#" + shortId;

  // store mapping in browser
  localStorage.setItem(shortId, url);

  document.getElementById("result").innerHTML =
    "🔗 Short Link: <br><br><a href='" + shortLink + "' target='_blank'>" + shortLink + "</a>";
}

// redirect system
window.onload = function () {
  let hash = window.location.hash.replace("#", "");

  if (hash) {
    let original = localStorage.getItem(hash);

    if (original) {
      window.location.href = original;
    } else {
      document.body.innerHTML = "❌ Link not found";
    }
  }
};

</script>

</body>
</html>
