<!DOCTYPE html>
<html>
<head>
  <title>Simple AI Chat</title>
</head>

<body style="margin:0;font-family:Arial;background:#0f172a;color:white;">

<h2 style="text-align:center;padding:10px;">🤖 Simple AI Chat</h2>

<div id="chat" style="height:75vh;overflow:auto;padding:10px;"></div>

<div style="display:flex;padding:10px;background:#111827;">
  <input id="input" style="flex:1;padding:10px;" placeholder="Ask anything..." />
  <button onclick="send()" style="padding:10px;">Send</button>
</div>

<script>

const API_KEY = "AIzaSyAXbgxsy5yHnZinjn4RsGxd6tWJsg8jdw8";

async function send() {
  let input = document.getElementById("input");
  let text = input.value;
  if (!text) return;

  add("👤 " + text);

  input.value = "";

  const res = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [
          { parts: [{ text: text }] }
        ]
      })
    }
  );

  const data = await res.json();

  const reply =
    data?.candidates?.[0]?.content?.parts?.[0]?.text ||
    "No response ❌";

  add("🤖 " + reply);
}

function add(text) {
  let div = document.createElement("div");
  div.style.margin = "10px";
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}

</script>

</body>
  </html>
