<!DOCTYPE html>
<html>
<head>
  <title>Viral Link Generator Pro</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      width:90%;
      max-width:500px;
      background:rgba(255,255,255,0.05);
      padding:20px;
      border-radius:15px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
      backdrop-filter:blur(10px);
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      outline:none;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#2563eb;
    }

    .result{
      margin-top:15px;
      word-break:break-all;
    }

    .copy{
      background:#22c55e;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>🔗 Viral Link Generator Pro</h2>

  <input id="url" placeholder="Paste your long URL" />

  <button onclick="gen()">Generate Link</button>

  <div class="result" id="out"></div>

</div>

<script>

let lastLink = "";

function gen(){
  let url = document.getElementById("url").value;

  if(!url){
    alert("Enter URL");
    return;
  }

  let id = Math.random().toString(36).substring(2,8);

  localStorage.setItem(id,url);

  let short = window.location.href.split("#")[0] + "#" + id;

  lastLink = short;

  document.getElementById("out").innerHTML = `
    <p>🔗 Short Link:</p>
    <a href="${short}" target="_blank">${short}</a>
    <button class="copy" onclick="copy()">Copy Link</button>
  `;
}

function copy(){
  navigator.clipboard.writeText(lastLink);
  alert("Copied!");
}

// redirect system
window.onload = function(){
  let id = window.location.hash.replace("#","");

  if(id){
    let url = localStorage.getItem(id);
    if(url){
      window.location.href = url;
    } else {
      document.body.innerHTML = "<h2>Link not found ❌</h2>";
    }
  }
}

</script>

</body>
</html>
